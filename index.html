<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE Toolkit</title>
  <!-- LINE LIFF SDK -->
  <script src="https://line-scdn.net"></script>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 20px; background: #f4f6f9; color: #333; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #1DB954; margin-bottom: 20px; }
    .btn-main { width: 100%; padding: 14px; margin: 8px 0; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #06C755; color: white; transition: 0.2s; }
    .btn-main:hover { background: #05b04b; }
    .section-box { display: none; margin-top: 15px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; }
    .section-box.active { display: block; }
    label { font-weight: bold; display: block; margin: 10px 0 5px; }
    input, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
    .btn-submit { width: 100%; padding: 12px; background: #17a2b8; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    .btn-submit:hover { background: #138496; }
    #resultArea { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-weight: 500; text-align: center; }
    .success-box { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error-box { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  </style>
</head>
<body>

<div class="container">
  <h2>LINE Utility App</h2>
  
  <!-- Main Nav Buttons -->
  <button class="btn-main" onclick="toggleSection('lunarSection')">2.1 Lunar Calendar</button>
  <button class="btn-main" onclick="toggleSection('fortuneSection')">2.2 Your Fortune</button>
  <button class="btn-main" onclick="toggleSection('luckySection')">2.3 Check Lucky Number</button>

  <!-- 3.1 Lunar Calendar Section -->
  <div id="lunarSection" class="section-box">
    <h3>Thai Lunar Calendar</h3>
    <label>Select Date:</label>
    <input type="date" id="lunarDate">
    <button class="btn-submit" onclick="submitLunar()">Calculate Lunar Date</button>
  </div>

  <!-- 3.2 Fortune Section -->
  <div id="fortuneSection" class="section-box">
    <h3>Your Fortune</h3>
    <label>Select Your Birthday:</label>
    <input type="date" id="fortuneBirthdate">
    <button class="btn-submit" onclick="submitFortune()">Check Fortune</button>
  </div>

  <!-- 3.3 Lucky Number Section -->
  <div id="luckySection" class="section-box">
    <h3>Check Lucky Number</h3>
    <label>Select a Number (00-99):</label>
    <select id="luckyNumSelect"></select>
    <button class="btn-submit" onclick="submitLuckyNumber()">Check Number</button>
  </div>

  <!-- Dynamic Output Container -->
  <div id="resultArea"></div>
</div>

<script>
  // CONFIGURATION: Paste your deployed Google Apps Script URL here
  const GAS_URL = "YOUR_GAS_WEB_APP_URL"; 

  // Dynamically generate numbers 00 to 99 for selection dropdown
  const selectNode = document.getElementById("luckyNumSelect");
  for (let i = 0; i <= 99; i++) {
    let opt = document.createElement("option");
    let formattedNum = i.toString().padStart(2, '0');
    opt.value = formattedNum;
    opt.textContent = formattedNum;
    selectNode.appendChild(opt);
  }

  // Toggles the visibility of your selection panels
  function toggleSection(sectionId) {
    document.querySelectorAll('.section-box').forEach(box => box.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
    document.getElementById('resultArea').style.display = 'none';
  }

  // Universal helper to communicate securely with Google Apps Script
  async function callAppsScript(actionType, payloadData) {
    const resultArea = document.getElementById('resultArea');
    resultArea.className = '';
    resultArea.style.display = 'block';
    resultArea.innerText = "Processing request...";

    try {
      const response = await fetch(GAS_URL, {
        method: "POST",
        mode: "cors",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: actionType, payload: payloadData })
      });
      
      const resData = await response.json();
      
      if (resData.status === "success") {
        resultArea.classList.add('success-box');
        resultArea.innerText = resData.data.resultString;
      } else {
        resultArea.classList.add('error-box');
        resultArea.innerText = "Error: " + resData.error;
      }
    } catch (err) {
      resultArea.classList.add('error-box');
      resultArea.innerText = "Failed to connect to script.";
      console.error(err);
    }
  }

  // 3.1 Parse Calendar Pick split into Date, Month, Year
  function submitLunar() {
    const rawDate = document.getElementById('lunarDate').value;
    if (!rawDate) return alert("Please pick a date first.");
    const parts = rawDate.split("-"); // [YYYY, MM, DD]
    callAppsScript("lunar_calendar", { date: parts[2], month: parts[1], year: parts[0] });
  }

  // 3.2 Send full date string to "Fortune" calculation route
  function submitFortune() {
    const bday = document.getElementById('fortuneBirthdate').value;
    if (!bday) return alert("Please select your birthdate first.");
    callAppsScript("fortune", { birthday: bday });
  }

  // 3.3 Send selected string layout "00" - "99" to "Luckynumber" route
  function submitLuckyNumber() {
    const num = document.getElementById('luckyNumSelect').value;
    callAppsScript("lucky_number", { number: num });
  }

  // Initialize LINE LIFF Application
  liff.init({ liffId: "2010549423-rpPcsDG0" })
    .then(() => {
      if (!liff.isLoggedIn()) {
        liff.login();
      }
    })
    .catch((err) => console.error("LIFF Init failed", err));
</script>

</body>
</html>
